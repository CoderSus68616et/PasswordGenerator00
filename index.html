<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --navy: #0a0e1a;
            --navy2: #0f1628;
            --navy3: #141c35;
            --cyan: #00d4ff;
            --cyan2: #00b8d9;
            --cyan3: rgba(0, 212, 255, 0.15);
            --cyan4: rgba(0, 212, 255, 0.07);
            --text: #e8f4f8;
            --muted: #6b8a9a;
            --border: rgba(0, 212, 255, 0.2);
            --border2: rgba(0, 212, 255, 0.08);
            --danger: #ff4f6d;
            --warn: #ffaa00;
            --success: #00e5a0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: var(--navy);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            overflow-x: hidden;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        canvas {
            display: block;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .vignette {
            position: fixed;
            inset: 0;
            z-index: 2;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(10, 14, 26, 0.85) 100%);
            pointer-events: none;
        }

        .page {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--cyan4);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 16px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--cyan);
            text-transform: uppercase;
            margin-bottom: 20px;
            animation: fadeUp 0.6s ease both;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--cyan);
            animation: pulse 2s ease-in-out infinite;
        }

        .header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(42px, 7vw, 72px);
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.0;
            background: linear-gradient(135deg, #ffffff 30%, var(--cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeUp 0.7s ease 0.1s both;
        }

        .header p {
            margin-top: 14px;
            font-size: 14px;
            color: var(--muted);
            letter-spacing: 0.5px;
            animation: fadeUp 0.7s ease 0.2s both;
        }

        .card {
            width: 100%;
            max-width: 580px;
            background: rgba(15, 22, 40, 0.85);
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 36px;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.8s ease 0.3s both;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
        }

        .card::after {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .output-area {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 10px;
            position: relative;
            transition: border-color 0.3s;
        }

        .output-area:hover {
            border-color: var(--cyan2);
        }

        .password-text {
            font-family: 'Space Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--cyan);
            letter-spacing: 2px;
            word-break: break-all;
            flex: 1;
            min-width: 0;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            transition: all 0.3s;
        }

        .password-text.empty {
            color: var(--muted);
            font-weight: 400;
            font-size: 14px;
            letter-spacing: 0;
        }

        .copy-btn {
            flex-shrink: 0;
            width: 42px;
            height: 42px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--cyan4);
            color: var(--cyan);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 18px;
        }

        .copy-btn:hover {
            background: var(--cyan3);
            border-color: var(--cyan);
            transform: scale(1.05);
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .copy-btn.copied {
            background: rgba(0, 229, 160, 0.15);
            border-color: var(--success);
            color: var(--success);
        }

        .strength-bar-wrap {
            margin-bottom: 28px;
        }

        .strength-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .strength-name {
            font-weight: 700;
        }

        .strength-name.weak {
            color: var(--danger);
        }

        .strength-name.fair {
            color: var(--warn);
        }

        .strength-name.strong {
            color: #00d4ff;
        }

        .strength-name.excellent {
            color: var(--success);
        }

        .strength-segments {
            display: flex;
            gap: 6px;
        }

        .seg {
            height: 4px;
            flex: 1;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.06);
            transition: background 0.4s ease;
        }

        .seg.active.weak {
            background: var(--danger);
        }

        .seg.active.fair {
            background: var(--warn);
        }

        .seg.active.strong {
            background: var(--cyan);
        }

        .seg.active.excellent {
            background: var(--success);
        }

        .section-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .slider-wrap {
            margin-bottom: 28px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .slider-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--cyan);
            line-height: 1;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.08);
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--navy2);
            border: 2px solid var(--cyan);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 28px;
        }

        .option-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.25s;
            user-select: none;
        }

        .option-toggle:hover {
            border-color: var(--border);
            background: rgba(0, 212, 255, 0.04);
        }

        .option-toggle.active {
            border-color: rgba(0, 212, 255, 0.35);
            background: var(--cyan4);
        }

        .option-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text);
        }

        .option-toggle.active .option-label {
            color: var(--cyan);
        }

        .toggle-switch {
            width: 34px;
            height: 20px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            transition: background 0.25s;
            flex-shrink: 0;
        }

        .option-toggle.active .toggle-switch {
            background: var(--cyan);
        }

        .toggle-knob {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: white;
            transition: transform 0.25s;
        }

        .option-toggle.active .toggle-knob {
            transform: translateX(14px);
        }

        .generate-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--cyan) 0%, #0099cc 100%);
            color: #000;
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.25s;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.35);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .generate-btn:hover::before {
            opacity: 1;
        }

        .btn-shimmer {
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: skewX(-20deg);
            animation: shimmer 2.5s ease-in-out infinite;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 229, 160, 0.15);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 12px 24px;
            border-radius: 40px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border2);
        }

        .stat {
            text-align: center;
            flex: 1;
        }

        .stat-val {
            font-family: 'Rajdhani', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--cyan);
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-lbl {
            font-family: 'Rajdhani', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        @keyframes shimmer {
            0% {
                left: -100%;
            }

            60%,
            100% {
                left: 150%;
            }
        }

        .char-highlight {
            animation: charPop 0.15s ease;
        }

        @keyframes charPop {
            0% {
                transform: scaleY(0.7);
                opacity: 0;
            }

            100% {
                transform: scaleY(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>
    <div class="grid-overlay"></div>
    <div class="vignette"></div>

    <div class="page">
        <div class="header">
            <div class="badge"><span class="badge-dot"></span>Security Tool</div>
            <h1>Password<br>Generator</h1>
            <p>Craft unbreakable passwords with military-grade entropy</p>
        </div>

        <div class="card">
            <div class="output-area">
                <div class="password-text empty" id="pwdDisplay">Click generate to begin</div>
                <button class="copy-btn" id="copyBtn" title="Copy to clipboard">⎘</button>
            </div>

            <div class="strength-bar-wrap">
                <div class="strength-label">
                    <span>Strength</span>
                    <span class="strength-name" id="strengthName">—</span>
                </div>
                <div class="strength-segments">
                    <div class="seg" id="seg0"></div>
                    <div class="seg" id="seg1"></div>
                    <div class="seg" id="seg2"></div>
                    <div class="seg" id="seg3"></div>
                </div>
            </div>

            <div class="slider-wrap">
                <div class="slider-header">
                    <div class="section-label">Password Length</div>
                    <div class="slider-value" id="lengthVal">16</div>
                </div>
                <input type="range" min="6" max="64" value="16" id="lengthSlider" step="1">
            </div>

            <div class="section-label">Character Types</div>
            <div class="options-grid">
                <div class="option-toggle active" data-key="upper">
                    <span class="option-label">Uppercase A–Z</span>
                    <div class="toggle-switch">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="option-toggle active" data-key="lower">
                    <span class="option-label">Lowercase a–z</span>
                    <div class="toggle-switch">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="option-toggle active" data-key="numbers">
                    <span class="option-label">Numbers 0–9</span>
                    <div class="toggle-switch">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="option-toggle active" data-key="symbols">
                    <span class="option-label">Symbols !@#$</span>
                    <div class="toggle-switch">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
            </div>

            <button class="generate-btn" id="generateBtn">
                <div class="btn-shimmer"></div>
                Generate Password →
            </button>

            <div class="stats">
                <div class="stat">
                    <div class="stat-val" id="statEntropy">0</div>
                    <div class="stat-lbl">Entropy (bits)</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="statPool">0</div>
                    <div class="stat-lbl">Pool Size</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="statTime">0s</div>
                    <div class="stat-lbl">Crack Time</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
        const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const LOWER = 'abcdefghijklmnopqrstuvwxyz';
        const NUMS = '0123456789';
        const SYMS = '!@#$%^&*()-_=+[]{}|;:,.<>?';

        const options = { upper: true, lower: true, numbers: true, symbols: true };
        let currentPwd = '';

        const slider = document.getElementById('lengthSlider');
        const lengthVal = document.getElementById('lengthVal');
        const pwdDisplay = document.getElementById('pwdDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const strengthName = document.getElementById('strengthName');
        const segs = [0, 1, 2, 3].map(i => document.getElementById('seg' + i));

        slider.addEventListener('input', () => {
            lengthVal.textContent = slider.value;
            updateTrack();
            if (currentPwd) generatePassword();
        });

        function updateTrack() {
            const pct = ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
            slider.style.background = `linear-gradient(90deg, #00d4ff ${pct}%, rgba(255,255,255,0.08) ${pct}%)`;
        }
        updateTrack();

        document.querySelectorAll('.option-toggle').forEach(el => {
            el.addEventListener('click', () => {
                const key = el.dataset.key;
                const active = Object.values(options).filter(Boolean).length;
                if (options[key] && active === 1) return;
                options[key] = !options[key];
                el.classList.toggle('active', options[key]);
                if (currentPwd) generatePassword();
                updateStats();
            });
        });

        function buildPool() {
            let pool = '';
            if (options.upper) pool += UPPER;
            if (options.lower) pool += LOWER;
            if (options.numbers) pool += NUMS;
            if (options.symbols) pool += SYMS;
            return pool;
        }

        function generatePassword() {
            const len = parseInt(slider.value);
            const pool = buildPool();
            if (!pool) return;

            const arr = new Uint32Array(len);
            crypto.getRandomValues(arr);
            let pwd = '';
            for (let i = 0; i < len; i++) pwd += pool[arr[i] % pool.length];

            currentPwd = pwd;
            animatePassword(pwd);
            updateStrength(pwd, pool.length);
            updateStats();
        }

        function animatePassword(pwd) {
            pwdDisplay.classList.remove('empty');
            let i = 0;
            pwdDisplay.textContent = '';
            const interval = setInterval(() => {
                if (i >= pwd.length) { clearInterval(interval); return; }
                pwdDisplay.textContent += pwd[i++];
            }, 18);
        }

        function updateStrength(pwd, poolSize) {
            const entropy = Math.log2(Math.pow(poolSize, pwd.length));
            let level, name;
            if (entropy < 40) { level = 1; name = 'Weak'; }
            else if (entropy < 60) { level = 2; name = 'Fair'; }
            else if (entropy < 80) { level = 3; name = 'Strong'; }
            else { level = 4; name = 'Excellent'; }

            const cls = name.toLowerCase();
            strengthName.textContent = name;
            strengthName.className = 'strength-name ' + cls;
            segs.forEach((s, i) => {
                s.className = 'seg' + (i < level ? ' active ' + cls : '');
            });
        }

        function updateStats() {
            const pool = buildPool();
            const len = parseInt(slider.value);
            const entropy = Math.log2(Math.pow(pool.length, len));
            const guessesPerSec = 1e12;
            const combos = Math.pow(pool.length, len);

            document.getElementById('statEntropy').textContent = Math.round(entropy);
            document.getElementById('statPool').textContent = pool.length;

            const seconds = combos / (2 * guessesPerSec);
            let timeStr;
            if (seconds < 60) timeStr = '<1m';
            else if (seconds < 3600) timeStr = Math.round(seconds / 60) + 'm';
            else if (seconds < 86400) timeStr = Math.round(seconds / 3600) + 'h';
            else if (seconds < 31536000) timeStr = Math.round(seconds / 86400) + 'd';
            else if (seconds < 3.154e10) timeStr = Math.round(seconds / 31536000) + 'yr';
            else if (seconds < 3.154e13) timeStr = Math.round(seconds / 3.154e10) + 'Kyr';
            else timeStr = '∞';
            document.getElementById('statTime').textContent = timeStr;
        }

        document.getElementById('generateBtn').addEventListener('click', generatePassword);

        copyBtn.addEventListener('click', async () => {
            if (!currentPwd) return;
            try {
                await navigator.clipboard.writeText(currentPwd);
                copyBtn.classList.add('copied');
                copyBtn.textContent = '✓';
                showToast();
                setTimeout(() => { copyBtn.classList.remove('copied'); copyBtn.textContent = '⎘'; }, 2000);
            } catch (e) {
                const ta = document.createElement('textarea');
                ta.value = currentPwd;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast();
            }
        });

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2200);
        }

        updateStats();
        generatePassword();
    </script>

    <script>
        (function () {
            const container = document.getElementById('canvas-container');
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 30);

            const cyanColor = new THREE.Color(0x00d4ff);
            const darkCyan = new THREE.Color(0x005f7a);

            const particleCount = 120;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);
            const velocities = [];

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 80;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 50;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 40;

                const c = Math.random() < 0.5 ? cyanColor : darkCyan;
                colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
                sizes[i] = Math.random() * 2.5 + 0.5;
                velocities.push({ x: (Math.random() - 0.5) * 0.015, y: (Math.random() - 0.5) * 0.015, z: (Math.random() - 0.5) * 0.008 });
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const particleMat = new THREE.PointsMaterial({
                size: 0.8, vertexColors: true, transparent: true, opacity: 0.7, sizeAttenuation: true
            });
            const particles = new THREE.Points(geometry, particleMat);
            scene.add(particles);

            const lineGeo = new THREE.BufferGeometry();
            const linePositions = [];
            for (let i = 0; i < particleCount; i++) {
                for (let j = i + 1; j < particleCount; j++) {
                    const dx = positions[i * 3] - positions[j * 3], dy = positions[i * 3 + 1] - positions[j * 3 + 1];
                    if (Math.sqrt(dx * dx + dy * dy) < 18) {
                        linePositions.push(positions[i * 3], positions[i * 3 + 1], positions[i * 3 + 2]);
                        linePositions.push(positions[j * 3], positions[j * 3 + 1], positions[j * 3 + 2]);
                    }
                }
            }
            lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
            const lineMat = new THREE.LineBasicMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.06 });
            scene.add(new THREE.LineSegments(lineGeo, lineMat));

            const torusGroup = new THREE.Group();
            const torusMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true, transparent: true, opacity: 0.07 });

            const t1 = new THREE.Mesh(new THREE.TorusGeometry(14, 0.15, 8, 60), torusMat);
            t1.rotation.x = 1.2;
            torusGroup.add(t1);

            const t2 = new THREE.Mesh(new THREE.TorusGeometry(9, 0.1, 8, 50), torusMat.clone());
            t2.material.opacity = 0.05;
            t2.rotation.y = 0.8; t2.rotation.z = 0.5;
            torusGroup.add(t2);

            const t3 = new THREE.Mesh(new THREE.TorusGeometry(20, 0.08, 6, 80), torusMat.clone());
            t3.material.opacity = 0.04;
            t3.rotation.x = 0.4; t3.rotation.z = 1.0;
            torusGroup.add(t3);

            scene.add(torusGroup);

            const octaGeo = new THREE.OctahedronGeometry(3.5, 0);
            const octaMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true, transparent: true, opacity: 0.12 });
            const octa = new THREE.Mesh(octaGeo, octaMat);
            octa.position.set(22, 12, -10);
            scene.add(octa);

            const octa2 = new THREE.Mesh(new THREE.OctahedronGeometry(2, 0),
                new THREE.MeshBasicMaterial({ color: 0x0099bb, wireframe: true, transparent: true, opacity: 0.1 }));
            octa2.position.set(-20, -10, -8);
            scene.add(octa2);

            const icoGeo = new THREE.IcosahedronGeometry(5, 0);
            const icoMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true, transparent: true, opacity: 0.05 });
            const ico = new THREE.Mesh(icoGeo, icoMat);
            ico.position.set(-25, 8, -15);
            scene.add(ico);

            let mouseX = 0, mouseY = 0;
            document.addEventListener('mousemove', e => {
                mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
                mouseY = -(e.clientY / window.innerHeight - 0.5) * 2;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            let t = 0;
            function animate() {
                requestAnimationFrame(animate);
                t += 0.005;

                torusGroup.rotation.y = t * 0.15;
                torusGroup.rotation.x = Math.sin(t * 0.1) * 0.2;

                octa.rotation.x += 0.008; octa.rotation.y += 0.012;
                octa2.rotation.x -= 0.006; octa2.rotation.y += 0.009;
                ico.rotation.y += 0.004; ico.rotation.z += 0.006;

                const pos = particles.geometry.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    pos[i * 3] += velocities[i].x;
                    pos[i * 3 + 1] += velocities[i].y;
                    pos[i * 3 + 2] += velocities[i].z;
                    if (Math.abs(pos[i * 3]) > 40) velocities[i].x *= -1;
                    if (Math.abs(pos[i * 3 + 1]) > 25) velocities[i].y *= -1;
                    if (Math.abs(pos[i * 3 + 2]) > 20) velocities[i].z *= -1;
                }
                particles.geometry.attributes.position.needsUpdate = true;

                camera.position.x += (mouseX * 4 - camera.position.x) * 0.02;
                camera.position.y += (mouseY * 2 - camera.position.y) * 0.02;
                camera.lookAt(0, 0, 0);

                renderer.render(scene, camera);
            }
            animate();
        })();
    </script>
</body>

</html>
